<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>본리초 5학년 영어 말하기 인증</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff9e6;
            --primary: #ffcc00;
            --primary-dark: #d4ac00;
            --green: #4CAF50;
            --green-dark: #388E3C;
            --red: #ff6666;
            --red-dark: #cc3333;
            --blue: #2196F3;
            --blue-dark: #1565C0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Jua', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #game-container {
            width: 860px;
            max-width: 100%;
            background: white;
            border: 8px solid var(--primary);
            border-radius: 30px;
            padding: 22px 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #title { color: #555; font-size: 22px; text-align: center; }

        #visual-area {
            font-size: 88px;
            line-height: 1.1;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease;
        }
        #visual-area.approach { transform: scale(1.35); }
        #visual-area.speaking { animation: talk 0.35s infinite alternate; }
        @keyframes talk {
            from { transform: rotate(-5deg) scale(1.05); }
            to   { transform: rotate( 5deg) scale(1.10); }
        }

        #message {
            background: #f9f9f9;
            border: 4px solid #eee;
            border-radius: 20px;
            padding: 16px 22px;
            min-height: 88px;
            width: 90%;
            font-size: 20px;
            line-height: 1.65;
            white-space: pre-line;
            text-align: center;
        }

        #choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 13px;
            width: 84%;
        }

            font-size: 18px;
